<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For My Love 💖</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      text-align: center;
      background-color: #fff0f5;
      padding: 50px;
    }
    #content {
      display: none;
      margin-top: 30px;
    }
    img {
      width: 200px;
      margin: 10px;
      border-radius: 15px;
    }
    input {
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 5px;
      border: none;
      background-color: #ff69b4;
      color: white;
      cursor: pointer;
      margin-left: 10px;
    }
    button:hover {
      background-color: #ff1493;
    }
    h2 {
      color: #ff1493;
    }
    p.message {
      font-size: 20px;
      font-weight: bold;
      color: #c71585;
      margin-top: 20px;
    }
